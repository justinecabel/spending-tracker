name: spending-tracker

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: ${COMPOSE_PROJECT_NAME:-spending-tracker}-tailscale
    hostname: ${TAILSCALE_HOSTNAME:-spending-tracker-api}
    environment:
      TS_STATE_DIR: /var/lib/tailscale
      TS_AUTH_ONCE: "true"
      TS_USERSPACE: "false"
      TS_ACCEPT_DNS: "false"
    volumes:
      - ./docker-data/tailscale:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-spending-tracker}-api
    network_mode: service:tailscale
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "4000"
      DB_PATH: /app/data/spending-tracker.sqlite
      EMPTY_ACCOUNT_GRACE_HOURS: ${EMPTY_ACCOUNT_GRACE_HOURS:-12}
      INACTIVE_ACCOUNT_RETENTION_MONTHS: ${INACTIVE_ACCOUNT_RETENTION_MONTHS:-12}
      CLEANUP_INTERVAL_HOURS: ${CLEANUP_INTERVAL_HOURS:-12}
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:1234}
      AI_MODEL: ${AI_MODEL:-phi-3-mini-4k-instruct}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-45000}
    volumes:
      - ./docker-data/database:/app/data
    depends_on:
      tailscale:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
